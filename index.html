<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Sakuga Ranking</title>

<style>

body{

    background:#000;

    color:white;

    font-family:sans-serif;

    text-align:center;

    margin:0;

}

h1{

    margin-top:60px;

    font-size:60px;

}

input{

    width:80%;

    max-width:700px;

    padding:25px;

    font-size:28px;

    border-radius:30px;

    border:none;

}

.result{

    margin-top:30px;

    font-size:24px;

}

a{

    color:#66aaff;

}

</style>

</head>

<body>

<h1>Sakuga Ranking</h1>

<input

id="search"

placeholder="アニメーター検索"

onkeydown="search(event)"

>

<div id="result" class="result"></div>

<script>

const data = {

    "nakamura_yutaka":{

        name:"中村豊",

        url:"https://www.sakugabooru.com/post?tags=nakamura_yutaka"

    },

    "honda_takeshi":{

        name:"本田雄",

        url:"https://www.sakugabooru.com/post?tags=honda_takeshi"

    }

};

function search(e){

    if(e.key !== "Enter") return;

    const word =

    document.getElementById("search")

    .value

    .trim();

    const result =

    document.getElementById("result");

    if(data[word]){

        result.innerHTML =

        `

        <h2>${data[word].name}</h2>

        <a href="${data[word].url}" target="_blank">

        Sakugabooruを見る

        </a>

        `;

    }else{

        result.innerHTML =

        "見つかりません";

    }

}

</script>

</body>

</html>
