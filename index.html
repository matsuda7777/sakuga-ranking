<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Sakuga Ranking</title>

<style>

body{

    background:#000;

    color:white;

    font-family:sans-serif;

    text-align:center;

    margin:0;

}

h1{

    margin-top:40px;

    font-size:60px;

}

input{

    width:80%;

    max-width:700px;

    padding:25px;

    font-size:28px;

    border-radius:30px;

    border:none;

}

button{

    margin-top:20px;

    padding:20px 50px;

    font-size:28px;

    border:none;

    border-radius:20px;

}

.result{

    margin-top:30px;

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

    gap:15px;

    padding:20px;

}

.card{

    background:#111;

    border-radius:10px;

    overflow:hidden;

}

.card img{

    width:100%;

    display:block;

}

.card a{

    color:white;

    text-decoration:none;

}

</style>

</head>

<body>

<h1>Sakuga Ranking</h1>

<input

id="search"

placeholder="例: yutaka_nakamura"

>

<br>

<button onclick="search()">検索</button>

<div id="result" class="result"></div>

<script>

function search(){

    const tag =

    document.getElementById("search")

    .value

    .trim();

    if(!tag)return;

    window.open(

      "https://www.sakugabooru.com/post?tags=" +

      encodeURIComponent(tag),

      "_blank"

    );

}

</script>

</body>

</html>
