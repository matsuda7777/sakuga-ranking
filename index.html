<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Sakuga Ranking</title>

<style>

body{

    background:#000;

    color:#fff;

    font-family:sans-serif;

    text-align:center;

    margin:0;

}

h1{

    font-size:70px;

    margin-top:80px;

}

input{

    width:85%;

    max-width:700px;

    padding:25px;

    font-size:28px;

    border:none;

    border-radius:30px;

}

button{

    margin-top:30px;

    padding:20px 50px;

    font-size:28px;

    border:none;

    border-radius:20px;

    cursor:pointer;

}

#results{

    width:90%;

    margin:40px auto;

}

.item{

    background:#111;

    margin-bottom:20px;

    padding:20px;

    border-radius:15px;

}

.item img{

    width:100%;

    border-radius:10px;

}

.item a{

    color:#66aaff;

    text-decoration:none;

}

</style>

</head>

<body>

<h1>Sakuga Ranking</h1>

<input

id="search"

placeholder="yutaka_nakamura"

>

<br>

<button onclick="search()">検索</button>

<div id="results"></div>

<script>

async function search(){

    const tag =

    document.getElementById("search")

    .value.trim();

    if(!tag) return;

    const results =

    document.getElementById("results");

    results.innerHTML = "<p>検索中...</p>";

    try{

        const res = await fetch(

            "https://www.sakugabooru.com/post.json?tags="

            + encodeURIComponent(tag)

        );

        const data = await res.json();

        if(!data.length){

            results.innerHTML =

            "<p>結果なし</p>";

            return;

        }

        results.innerHTML = "";

        data.slice(0,20).forEach(post=>{

            results.innerHTML += `

            <div class="item">

                <img src="${post.preview_url}">

                <p>Score: ${post.score}</p>

                <a href="https://www.sakugabooru.com/post/show/${post.id}" target="_blank">

                    開く

                </a>

            </div>

            `;

        });

    }catch(error){

        results.innerHTML =

        "<p>API取得失敗</p>";

        console.error(error);

    }

}

</script>

</body>

</html>
