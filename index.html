<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Sakuga Ranking</title>

<style>

body{

    background:#000;

    color:white;

    font-family:sans-serif;

    text-align:center;

    margin:0;

}

h1{

    margin-top:60px;

    font-size:60px;

}

input{

    width:80%;

    max-width:700px;

    padding:25px;

    font-size:28px;

    border-radius:30px;

    border:none;

}

button{

    margin-top:20px;

    padding:15px 40px;

    font-size:24px;

    border:none;

    border-radius:20px;

    cursor:pointer;

}

</style>

</head>

<body>

<h1>Sakuga Ranking</h1>

<input

id="search"

placeholder="yutaka_nakamura など入力"

onkeydown="search(event)"

>

<br>

<button onclick="goSearch()">

検索

</button>

<script>

function goSearch(){

    const tag =

    document.getElementById("search")

    .value

    .trim();

    if(!tag){

        alert("タグを入力してください");

        return;

    }

    window.open(

        "https://www.sakugabooru.com/post?tags=" +

        encodeURIComponent(tag),

        "_blank"

    );

}

function search(e){

    if(e.key === "Enter"){

        goSearch();

    }

}

</script>

</body>

</html>
