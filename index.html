<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Sakuga Ranking</title>

<style>

body{

    background:#000;

    color:#fff;

    font-family:sans-serif;

    text-align:center;

    margin:0;

}

h1{

    font-size:70px;

    margin-top:80px;

}

input{

    width:85%;

    max-width:700px;

    padding:25px;

    font-size:28px;

    border:none;

    border-radius:30px;

}

button{

    margin-top:30px;

    padding:20px 50px;

    font-size:28px;

    border:none;

    border-radius:20px;

    cursor:pointer;

}

#results{

    width:90%;

    margin:40px auto;

}

.item{

    background:#111;

    margin-bottom:20px;

    padding:20px;

    border-radius:15px;

}

.item img{

    width:100%;

    border-radius:10px;

}

.item a{

    color:#66aaff;

    text-decoration:none;

}

</style>

</head>

<body>

<h1>Sakuga Ranking</h1>

<input

id="search"

placeholder="yutaka_nakamura"

>

<br>

<button onclick="search()">検索</button>

<div id="results"></div>

<script>

function search(){

    const tag =

        document.getElementById("search")

        .value

        .trim();

    if(!tag) return;

    document.getElementById("results").innerHTML =

    `

    <div class="item">

      <h2>${tag}</h2>

      <p>

        Sakugabooruで検索

      </p>

      <a href="https://www.sakugabooru.com/post?tags=${encodeURIComponent(tag)}" target="_blank">

        結果を見る

      </a>

    </div>

    `;

}

</script>

</body>

</html>
